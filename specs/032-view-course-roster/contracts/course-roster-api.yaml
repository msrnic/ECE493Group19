openapi: 3.0.3
info:
  title: View list of students enrolled in my course offerings (UC-32) API Contract
  version: 1.0.0
paths:
  /api/feature/request:
    post:
      summary: Execute primary feature action
      responses:
        '200':
          description: Success or alternate outcome
        '400':
          description: Validation failure
        '403':
          description: Authorization failure
        '500':
          description: Processing failure with no state mutation
  /api/feature/status:
    get:
      summary: Retrieve current feature status/details
      responses:
        '200':
          description: Current status available
        '503':
          description: Dependency unavailable, result may be incomplete
