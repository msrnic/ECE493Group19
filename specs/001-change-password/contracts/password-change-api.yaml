openapi: 3.0.3
info:
  title: Password Change Contract
  version: 0.1.0
  description: Contract for password change and admin-initiated password reset flows.
servers:
  - url: https://example.local
paths:
  /account/security/password-change:
    post:
      summary: Change own password via current password verification
      tags: [Password]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordChangeSuccess'
        '400':
          description: Policy validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyError'
        '401':
          description: Current password invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationError'
        '429':
          description: Cooldown active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CooldownError'
        '500':
          description: System error, no password change applied
  /auth/reset-password/confirm:
    post:
      summary: Set new password using reset token
      tags: [Password]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resetToken, newPassword]
              properties:
                resetToken:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordChangeSuccess'
        '400':
          description: Policy validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyError'
        '401':
          description: Token invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationError'
        '429':
          description: Cooldown active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CooldownError'
        '500':
          description: System error, no password change applied
  /admin/users/{userId}/password:
    post:
      summary: Admin changes password for another user
      tags: [Admin Password]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword]
              properties:
                newPassword:
                  type: string
      responses:
        '200':
          description: Password changed successfully for target user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordChangeSuccess'
        '400':
          description: Policy validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyError'
        '403':
          description: Requester lacks admin authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthzError'
        '404':
          description: Target user not found
        '500':
          description: System error, no password change applied
components:
  schemas:
    PasswordChangeSuccess:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          enum: [success]
        message:
          type: string
        notificationQueued:
          type: boolean
        invalidatedSessionCount:
          type: integer
          minimum: 0
    PolicyError:
      type: object
      required: [status, message, failedRules]
      properties:
        status:
          type: string
          enum: [error]
        message:
          type: string
        failedRules:
          type: array
          items:
            type: string
    VerificationError:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          enum: [error]
        message:
          type: string
        recoveryOptions:
          type: array
          items:
            type: string
    CooldownError:
      type: object
      required: [status, message, retryAfterSeconds]
      properties:
        status:
          type: string
          enum: [error]
        message:
          type: string
        retryAfterSeconds:
          type: integer
          minimum: 1
    AuthzError:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          enum: [error]
        message:
          type: string
