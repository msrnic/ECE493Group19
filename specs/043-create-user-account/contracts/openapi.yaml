openapi: 3.0.3
info:
  title: Admin Account Creation API
  version: 0.2.0
  description: >-
    Contracts for the implemented UC-43 administrative account creation flow.
    This delivery follows the requested preset-password scope: administrators
    create accounts by supplying an email address, an assignable role, and a
    password that satisfies the active password policy.
servers:
  - url: https://example.edu
paths:
  /api/admin/accounts/form-metadata:
    get:
      summary: Fetch assignable roles and password policy for the create-user form
      operationId: getAccountFormMetadata
      tags: [Admin Accounts]
      responses:
        '200':
          description: Form metadata returned for an authorized administrator.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetFormMetadataResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/accounts:
    post:
      summary: Create a new user account with an email, role, and preset password
      operationId: createUserAccount
      tags: [Admin Accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '201':
          description: Account created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAccountSuccessResponse'
        '400':
          description: Validation failure for email, role, or password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Duplicate email after trim-and-lowercase normalization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictErrorResponse'
        '500':
          description: System failure. No account is created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  responses:
    Unauthorized:
      description: Unauthenticated request. The client is told where to sign in again.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthRedirectResponse'
    Forbidden:
      description: Authenticated request without administrative authorization.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    AuthRedirectResponse:
      type: object
      required: [loginUrl, returnTo, status]
      properties:
        loginUrl:
          type: string
          example: /login
        returnTo:
          type: string
          example: /admin/users/new
        status:
          type: string
          enum: [auth_error]

    AssignableRole:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          minimum: 1
        name:
          type: string
          example: Student

    PasswordPolicy:
      type: object
      required: [minLength, requiresUpper, requiresLower, requiresDigit, requiresSpecial]
      properties:
        minLength:
          type: integer
          minimum: 12
          example: 12
        requiresUpper:
          type: boolean
          example: true
        requiresLower:
          type: boolean
          example: true
        requiresDigit:
          type: boolean
          example: true
        requiresSpecial:
          type: boolean
          example: true

    GetFormMetadataResponse:
      type: object
      required: [notificationsEnabled, passwordPolicy, roles]
      properties:
        notificationsEnabled:
          type: boolean
        passwordPolicy:
          $ref: '#/components/schemas/PasswordPolicy'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/AssignableRole'

    CreateAccountRequest:
      type: object
      required: [email, password, roleId]
      properties:
        email:
          type: string
          format: email
          description: >-
            Unique account identifier. The server trims surrounding whitespace and
            compares case-insensitively.
          example: new.user@example.com
        password:
          type: string
          minLength: 12
          description: Preset password supplied by the administrator.
          example: ValidPass!234
        roleId:
          type: integer
          minimum: 1
          example: 2

    NotificationResult:
      type: object
      required: [enabled, status]
      properties:
        enabled:
          type: boolean
        status:
          type: string
          enum: [sent, failed, skipped_disabled]
        warning:
          type: string
          description: Present only when notification delivery fails.

    CreateAccountSuccessResponse:
      type: object
      required:
        - accountId
        - accountIdentifier
        - assignedRole
        - accountStatus
        - mustChangePassword
        - notification
      properties:
        accountId:
          type: integer
        accountIdentifier:
          type: string
          example: new.user@example.com
        assignedRole:
          type: string
          example: Student
        accountStatus:
          type: string
          enum: [active]
        mustChangePassword:
          type: boolean
          enum: [true]
        notification:
          $ref: '#/components/schemas/NotificationResult'

    ValidationError:
      type: object
      required: [code, field, message]
      properties:
        code:
          type: string
          example: INVALID_EMAIL
        field:
          type: string
          enum: [email, password, roleId]
        message:
          type: string

    PreservedValues:
      type: object
      required: [email, roleId]
      properties:
        email:
          type: string
          example: bad-email
        roleId:
          oneOf:
            - type: integer
              minimum: 1
            - type: string
              enum: ['']

    ValidationErrorResponse:
      type: object
      required: [error, errors, preservedValues]
      properties:
        error:
          type: string
          enum: [Validation failed]
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
        preservedValues:
          $ref: '#/components/schemas/PreservedValues'

    ConflictErrorResponse:
      type: object
      required: [code, error, field]
      properties:
        code:
          type: string
          enum: [DUPLICATE_IDENTIFIER]
        error:
          type: string
          example: An account with that email already exists.
        field:
          type: string
          enum: [email]

    ErrorResponse:
      type: object
      required: [code, error]
      properties:
        code:
          type: string
          example: INTERNAL_ERROR
        error:
          type: string
