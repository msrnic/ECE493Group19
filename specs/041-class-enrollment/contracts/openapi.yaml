openapi: 3.0.3
info:
  title: Student Enrollment API
  version: 1.0.0
  description: API contract for UC-17 student self-service class enrollment.
servers:
  - url: https://example.edu
paths:
  /api/offerings:
    get:
      summary: Search class offerings for enrollment
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
        - name: term
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching offerings
          content:
            application/json:
              schema:
                type: object
                properties:
                  offerings:
                    type: array
                    items:
                      $ref: "#/components/schemas/OfferingSummary"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/enrollments:
    post:
      summary: Submit enrollment request for one class offering
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollmentRequest"
      responses:
        "201":
          description: Enrollment succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollmentSuccessResponse"
        "409":
          description: Enrollment blocked by one or more eligibility conditions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollmentBlockedResponse"
        "500":
          description: Enrollment failed due to internal system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollmentErrorResponse"

  /api/students/{studentId}/schedule:
    get:
      summary: Get current student schedule
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current student schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleResponse"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  responses:
    BadRequest:
      description: Invalid request payload or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Requested resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    OfferingSummary:
      type: object
      required: [offeringId, courseCode, section, term, remainingSeats, meetingTimes]
      properties:
        offeringId:
          type: string
        courseCode:
          type: string
        section:
          type: string
        term:
          type: string
        remainingSeats:
          type: integer
          minimum: 0
        meetingTimes:
          type: array
          items:
            type: object
            properties:
              day:
                type: string
              start:
                type: string
              end:
                type: string

    EnrollmentRequest:
      type: object
      required: [studentId, offeringId, requestId]
      properties:
        studentId:
          type: string
        offeringId:
          type: string
        requestId:
          type: string
          description: Client-generated idempotency key for duplicate-submit protection.

    EnrollmentSuccessResponse:
      type: object
      required: [status, enrollmentId, studentId, offeringId, schedule, feeAssessment]
      properties:
        status:
          type: string
          enum: [ENROLLED]
        enrollmentId:
          type: string
        studentId:
          type: string
        offeringId:
          type: string
        schedule:
          $ref: "#/components/schemas/ScheduleResponse"
        feeAssessment:
          $ref: "#/components/schemas/FeeAssessment"
        message:
          type: string

    EnrollmentBlockedResponse:
      type: object
      required: [status, studentId, offeringId, blockingReasons]
      properties:
        status:
          type: string
          enum: [BLOCKED]
        studentId:
          type: string
        offeringId:
          type: string
        blockingReasons:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/BlockingReason"
        message:
          type: string

    EnrollmentErrorResponse:
      type: object
      required: [status, studentId, offeringId, errorCode, message]
      properties:
        status:
          type: string
          enum: [ERROR]
        studentId:
          type: string
        offeringId:
          type: string
        errorCode:
          type: string
          enum: [ENROLLMENT_TRANSACTION_FAILED]
        message:
          type: string
          example: Enrollment could not be completed. Please retry.

    BlockingReason:
      type: object
      required: [code, detail]
      properties:
        code:
          type: string
          enum:
            - PREREQUISITE
            - CAPACITY
            - HOLD
            - SCHEDULE_CONFLICT
            - DUPLICATE_ENROLLMENT
        detail:
          type: string
        metadata:
          type: object
          additionalProperties: true

    ScheduleResponse:
      type: object
      required: [studentId, term, items]
      properties:
        studentId:
          type: string
        term:
          type: string
        items:
          type: array
          items:
            type: object
            required: [offeringId, courseCode, section, meetingTimes]
            properties:
              offeringId:
                type: string
              courseCode:
                type: string
              section:
                type: string
              meetingTimes:
                type: array
                items:
                  type: object
                  properties:
                    day:
                      type: string
                    start:
                      type: string
                    end:
                      type: string

    FeeAssessment:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [CURRENT, PENDING_REFRESH]
        totalAmount:
          type: number
          format: float
        currency:
          type: string
          default: CAD
        message:
          type: string

    ErrorEnvelope:
      type: object
      required: [errorCode, message]
      properties:
        errorCode:
          type: string
        message:
          type: string
