<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Force Withdraw Student</title>
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/security.css">
    <link rel="stylesheet" href="/css/admin-account.css">
  </head>
  <body>
    <main class="login-shell">
      <section class="login-card admin-account-card" aria-labelledby="force-withdrawal-title">
        <p class="eyebrow">Admin Operations</p>
        <h1 id="force-withdrawal-title">Force Withdraw Student</h1>
        <p class="help-text">Remove an enrolled student from a selected offering and record the administrative action.</p>
        {{result_banner_html}}
        <div class="error-banner" role="alert">{{error_message}}</div>
        <form method="get" action="/admin/force-withdrawals/implications" novalidate>
          <label for="studentIdentifier">Student ID or email</label>
          <input id="studentIdentifier" name="studentId" type="text" class="{{student_input_class}}" value="{{student_identifier}}" required>
          {{student_error_html}}

          <label for="offeringId">Course offering</label>
          <select id="offeringId" name="offeringId" class="{{offering_input_class}}" required>
            {{offering_options_html}}
          </select>
          {{offering_error_html}}

          <label for="reason">Required reason</label>
          <textarea id="reason" name="reason" rows="5" class="{{reason_input_class}}" required>{{reason_value}}</textarea>
          {{reason_error_html}}

          <div class="action-row">
            <button type="submit">Review Implications</button>
            <button type="submit" formaction="/admin/force-withdrawals" formmethod="post">Force Withdraw</button>
            <a class="login-button-link secondary-link" href="{{return_path}}">Cancel</a>
          </div>
        </form>
        {{pending_audit_html}}
      </section>
    </main>
  </body>
</html>
