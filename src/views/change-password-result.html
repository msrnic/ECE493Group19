<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Change Result</title>
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/security.css">
  </head>
  <body>
    <main class="login-shell">
      <section class="login-card" aria-labelledby="result-title">
        <p class="eyebrow">Security outcome</p>
        <h1 id="result-title">{{outcome_heading}}</h1>
        <p class="help-text">{{outcome_message}}</p>
        <p class="status-chip">HTTP status: {{status_chip}}</p>
        <ul class="rule-list">{{detail_items_html}}</ul>
        <a class="login-button-link" href="{{continue_href}}">{{continue_label}}</a>
      </section>
    </main>
  </body>
</html>
