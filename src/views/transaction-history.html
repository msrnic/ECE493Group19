<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History</title>
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/security.css">
    <link rel="stylesheet" href="/css/dashboard.css">
  </head>
  <body>
    <main class="login-shell">
      <section class="login-card dashboard-shell">
        <p class="eyebrow">Financial records</p>
        <h1>Transaction History</h1>
        <p class="help-text">Signed in as {{signed_in_as}}.</p>
        <p id="transaction-history-status" class="status-chip dashboard-status" data-status="{{status_class}}">{{status_message}}</p>
        <div class="action-row">
          <a class="login-button-link secondary-link" href="/dashboard#financial-summary">Back to dashboard</a>
          <a class="login-button-link secondary-link" href="{{retry_href}}">Refresh records</a>
        </div>
        <section id="transaction-history-state">{{state_html}}</section>
        <section id="transaction-history-list" class="dashboard-sections">{{transaction_rows_html}}</section>
      </section>
    </main>
  </body>
</html>
