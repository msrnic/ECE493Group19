<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Grade Entry</title>
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/security.css">
    <link rel="stylesheet" href="/css/profile-editor.css">
  </head>
  <body>
    <main class="login-shell">
      <section class="login-card profile-card profile-card--wide">
        <p class="eyebrow">Current Courses</p>
        <h1>{{offering_heading}}</h1>
        <p class="help-text">{{deadline_text}}</p>
        <p class="help-text">Submission status: {{offering_status}}</p>
        {{status_banner_html}}
        <form method="post" class="profile-section">
          <table class="course-list">
            <thead>
              <tr><th>Student ID</th><th>Student</th><th>Final Grade</th></tr>
            </thead>
            <tbody>{{roster_rows_html}}</tbody>
          </table>
          <div class="action-row profile-actions">
            <button class="login-button-link secondary-link" type="submit" name="intent" value="draft">Save as Draft</button>
            <button class="login-button-link" type="submit" name="intent" value="submit">Submit Grades</button>
            <a class="login-button-link secondary-link" href="{{summary_link}}">View grade summary</a>
            <a class="login-button-link secondary-link" href="/dashboard#teaching-workload">Back to dashboard</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
