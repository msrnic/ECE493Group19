<!DOCTYPE html>
<html lang='en'>
  <head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Confirm Withdrawal</title>
    <link rel='stylesheet' href='/css/login.css'>
    <link rel='stylesheet' href='/css/security.css'>
    <link rel='stylesheet' href='/css/profile-editor.css'>
  </head>
  <body>
    <main class='login-shell'>
      <section class='login-card profile-card profile-card--wide'>
        <p class='eyebrow'>Enrollment Hub</p>
        <h1>Confirm Withdrawal</h1>
        <p class='help-text'>Review the academic and fee implications before removing this class from your current schedule.</p>
        {{result_banner_html}}
        <section class='profile-section'>
          <h2>{{course_heading}}</h2>
          <p class='help-text'>Offering: {{offering_code}}</p>
          <ul class='course-list'>
            <li>{{transcript_impact}}</li>
            <li>{{fee_impact}}</li>
          </ul>
        </section>
        <form method='post' action='/enrollment/withdraw/{{offering_id}}' class='profile-section'>
          <div class='action-row profile-actions'>
            <button type='submit' name='action' value='confirm'>Confirm withdrawal</button>
            <button type='submit' name='action' value='cancel'>Cancel</button>
            <a class='login-button-link secondary-link' href='/enrollment'>Back to schedule</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
